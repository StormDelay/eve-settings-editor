name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          # 24: `node --test` strips the TypeScript itself, so the frontend
          # tests need no test framework and no extra dependency.
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci
      - name: Typecheck frontend
        working-directory: app
        run: npm run check
      - name: Test frontend
        working-directory: app
        run: npm test
      - name: Build frontend (generate_context embeds build/)
        working-directory: app
        run: npm run build
      - name: Test workspace
        run: cargo test --workspace
        # Corpus gates skip on CI: testdata/ is local-only by design (spec §8).
