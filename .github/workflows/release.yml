name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # same as ci.yml
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install frontend dependencies
        working-directory: app
        run: npm ci
      # Build the release body from this tag's CHANGELOG section so each release
      # ships a real summary, not a bare pointer. bash is available on all three
      # runners (Windows via Git Bash). Falls back to the generic note if the
      # section is missing.
      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # index()-based matching, not regex: the header contains '[' and ']',
          # which are regex metacharacters that gawk mangles under escaping.
          section=$(awk -v ver="$version" '
            index($0, "## [" ver "]") == 1 { grab=1; next }
            grab && index($0, "## [") == 1 { exit }
            grab { print }
          ' CHANGELOG.md)
          {
            echo 'RELEASE_BODY<<__EOF__'
            if [ -n "$(printf '%s' "$section" | tr -d '[:space:]')" ]; then
              printf '%s\n\n' "$section"
            fi
            echo 'Unsigned builds — expect OS warnings on first launch (spec §11).'
            echo '__EOF__'
          } >> "$GITHUB_ENV"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: "EVE Settings Editor ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: ${{ env.RELEASE_BODY }}

  # The bundler names assets by extension only (.msi/.dmg/.AppImage), so which
  # OS a file is for isn't obvious in the release list. Prefix each with its OS
  # once all three builds have uploaded. Idempotent, so re-runs are safe.
  label-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Prefix release assets with their target OS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          rel=$(gh api "repos/$REPO/releases" --jq \
            "map(select(.tag_name==\"$TAG\")) | first | .id")
          gh api "repos/$REPO/releases/$rel/assets" \
            --jq '.[] | "\(.id) \(.name)"' | while read -r id name; do
            case "$name" in
              Windows-*|macOS-*|Linux-*) continue ;;
              *.exe|*.msi)               os=Windows ;;
              *.dmg|*.app.tar.gz)        os=macOS ;;
              *.deb|*.rpm|*.AppImage)    os=Linux ;;
              *)                         continue ;;
            esac
            gh api -X PATCH "repos/$REPO/releases/assets/$id" \
              -f name="$os-$name" --jq '"renamed -> \(.name)"'
          done
